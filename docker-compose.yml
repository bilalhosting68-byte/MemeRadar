services:
  postgres:
    image: postgres:16-alpine
    container_name: memeradar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memeradar
      POSTGRES_PASSWORD: memeradar
      POSTGRES_DB: memeradar
    ports:
      - "5432:5432"
    volumes:
      - memeradar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memeradar -d memeradar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  memeradar_postgres_data:
